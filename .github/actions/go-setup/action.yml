# .github/actions/go-setup/action.yml
name: 'Go Environment Setup'
description: 'Sets up Go and installs Go Task.'
inputs:
  go-version:
    description: 'The Go version to set up.'
    required: false
    default: '1.24.4' # Match the project's Go version

runs:
  using: "composite"
  steps:
    - name: Set up Go ${{ inputs.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: true
        cache-dependency-path: |
          go.sum
          go.mod

    - name: Cache Go tools
      uses: actions/cache@v4
      id: cache-go-tools
      with:
        path: ~/go/bin/task
        key: go-tools-${{ runner.os }}-${{ inputs.go-version }}-task-v3
        restore-keys: |
          go-tools-${{ runner.os }}-${{ inputs.go-version }}-

    - name: Install Go Task
      if: steps.cache-go-tools.outputs.cache-hit != 'true'
      shell: bash
      run: |
        go install github.com/go-task/task/v3/cmd/task@latest

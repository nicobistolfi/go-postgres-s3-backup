version: "3"

vars:
  BINARY_NAME: "go-postgres-s3-backup"
  LAMBDA_BINARY: "bootstrap"
  LAMBDA_ZIP: "bootstrap.zip"
  LAYER_ZIP: "postgres-layer.zip"
  STACK_PREFIX: "go-postgres-s3-backup"
  CF_TEMPLATE: "cloudformation/template.yml"
  CF_PACKAGED_TEMPLATE: "cloudformation/template.packaged.yml"

tasks:
  run:
    desc: Run the backup function locally
    dotenv: ['.env']
    cmds:
      - go run ./cmd/lambda/main.go

  build:postgres-layer:
    desc: Build PostgreSQL layer for AWS Lambda
    dir: postgres-layer
    cmds:
      - ./build.sh

  build:lambda:
    desc: Build for AWS Lambda
    deps: [build:postgres-layer]
    cmds:
      - GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags='-s -w' -o {{.LAMBDA_BINARY}} ./cmd/lambda

  test:
    desc: Run all tests
    cmds:
      - go test -v ./...

  test:coverage:
    desc: Run tests with coverage
    cmds:
      - go test -v -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  fmt:check:
    desc: Check Go code formatting
    cmds:
      - test -z "$(gofmt -l .)"

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  mod:
    desc: Download and tidy Go modules
    cmds:
      - go mod download
      - go mod tidy

  mod:update:
    desc: Update Go modules
    cmds:
      - go get -u ./...
      - go mod tidy

  mod:verify:
    desc: Verify Go module dependencies
    cmds:
      - go mod verify

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w -s .

  vuln:check:
    desc: Check for vulnerabilities using govulncheck
    cmds:
      - govulncheck ./...
    preconditions:
      - sh: command -v govulncheck
        msg: "govulncheck is not installed. Please run: go install golang.org/x/vuln/cmd/govulncheck@latest"

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
      - rm -f {{.LAMBDA_BINARY}}
      - rm -f {{.LAMBDA_ZIP}}
      - rm -f {{.LAYER_ZIP}}
      - rm -f {{.CF_PACKAGED_TEMPLATE}}
      - rm -f coverage.out

  cf:package:
    desc: Build the Lambda binary and layer, zip them, and upload via `aws cloudformation package`
    dotenv: ['.env']
    deps: [build:lambda]
    vars:
      STAGE: '{{.STAGE | default "dev"}}'
      REGION: '{{.REGION | default "us-west-1"}}'
    cmds:
      - zip -j {{.LAMBDA_ZIP}} {{.LAMBDA_BINARY}}
      - cd postgres-layer && zip -r ../{{.LAYER_ZIP}} opt
      - |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        ARTIFACT_BUCKET="${ARTIFACT_BUCKET:-{{.STACK_PREFIX}}-artifacts-${ACCOUNT_ID}-{{.REGION}}}"
        if ! aws s3api head-bucket --bucket "$ARTIFACT_BUCKET" --region {{.REGION}} 2>/dev/null; then
          aws s3 mb "s3://$ARTIFACT_BUCKET" --region {{.REGION}}
        fi
        aws cloudformation package \
          --template-file {{.CF_TEMPLATE}} \
          --s3-bucket "$ARTIFACT_BUCKET" \
          --output-template-file {{.CF_PACKAGED_TEMPLATE}} \
          --region {{.REGION}}

  cf:deploy:
    desc: Deploy the stack via CloudFormation
    dotenv: ['.env']
    deps: [cf:package]
    vars:
      STAGE: '{{.STAGE | default "dev"}}'
      REGION: '{{.REGION | default "us-west-1"}}'
    cmds:
      - |
        if [ -z "${DATABASE_URL:-}" ]; then
          echo "DATABASE_URL is required (set it in .env or export it)" >&2
          exit 1
        fi
        aws cloudformation deploy \
          --template-file {{.CF_PACKAGED_TEMPLATE}} \
          --stack-name {{.STACK_PREFIX}}-{{.STAGE}} \
          --parameter-overrides \
              Stage={{.STAGE}} \
              DatabaseUrl="$DATABASE_URL" \
              DailyBackupRetentionDays="${DAILY_BACKUP_RETENTION_DAYS:-7}" \
          --capabilities CAPABILITY_NAMED_IAM \
          --region {{.REGION}} \
          --no-fail-on-empty-changeset
      - aws cloudformation describe-stacks --stack-name {{.STACK_PREFIX}}-{{.STAGE}} --region {{.REGION}} --query 'Stacks[0].Outputs' --output table

  cf:remove:
    desc: Delete the CloudFormation stack (backup bucket is retained)
    dotenv: ['.env']
    vars:
      STAGE: '{{.STAGE | default "dev"}}'
      REGION: '{{.REGION | default "us-west-1"}}'
    cmds:
      - aws cloudformation delete-stack --stack-name {{.STACK_PREFIX}}-{{.STAGE}} --region {{.REGION}}
      - aws cloudformation wait stack-delete-complete --stack-name {{.STACK_PREFIX}}-{{.STAGE}} --region {{.REGION}}
      - echo "Stack deleted. Backup bucket was retained - delete it manually if no longer needed."

  cf:logs:
    desc: Tail CloudWatch logs for the Lambda
    dotenv: ['.env']
    vars:
      STAGE: '{{.STAGE | default "dev"}}'
      REGION: '{{.REGION | default "us-west-1"}}'
    cmds:
      - aws logs tail /aws/lambda/{{.STACK_PREFIX}}-{{.STAGE}} --follow --region {{.REGION}}

  cf:invoke:
    desc: Manually invoke the backup Lambda
    dotenv: ['.env']
    vars:
      STAGE: '{{.STAGE | default "dev"}}'
      REGION: '{{.REGION | default "us-west-1"}}'
    cmds:
      - aws lambda invoke --function-name {{.STACK_PREFIX}}-{{.STAGE}} --region {{.REGION}} /tmp/invoke-out.json
      - cat /tmp/invoke-out.json

  deploy:
    desc: Deploy to AWS via CloudFormation (alias for cf:deploy)
    deps: [cf:deploy]

  logs:
    desc: Tail Lambda logs (alias for cf:logs)
    deps: [cf:logs]

  invoke:
    desc: Manually trigger backup (alias for cf:invoke)
    deps: [cf:invoke]

  default:
    desc: Default task (format, test, build)
    deps: [fmt, test, build:lambda]
